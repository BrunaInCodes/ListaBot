<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ListaBot</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: Helvetica, Arial, sans-serif;
        background: #e5ddd5;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        max-height: 800px;
        background: #efeae2;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 12px rgba(0,0,0,.2);
      }

      header {
        background: #075e54;
        color: #fff;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      header .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #128c7e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      header .info b { display: block; font-size: 15px; }
      header .info span { font-size: 12px; opacity: .8; }

      #messages {
        list-style: none;
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background-image: url('fundo-whats.jpg');
        background-size: cover;
      }

      #messages li {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
        box-shadow: 0 1px 1px rgba(0,0,0,.08);
      }

      #messages li.usuario {
        align-self: flex-end;
        background: #dcf8c6;
        border-top-right-radius: 0;
      }

      #messages li.robo {
        align-self: flex-start;
        background: #ffffff;
        border-top-left-radius: 0;
      }

      form {
        display: flex;
        padding: 10px;
        background: #f0f0f0;
        gap: 8px;
      }

      form input {
        flex: 1;
        border: none;
        border-radius: 20px;
        padding: 10px 16px;
        font-size: 14px;
        outline: none;
      }

      form button {
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        background: #128c7e;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="avatar">🤖</div>
        <div class="info">
          <b>ListaBot</b>
          <span>assistente da lista de compras</span>
        </div>
      </header>
      <ul id="messages"></ul>
      <form action="">
        <input id="m" autocomplete="off" placeholder="Digite uma mensagem" />
        <button>➤</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-1.11.1.js"></script>
    <script>
      $(function () {
        var socket = io();
        $('form').submit(function(){
          socket.emit('chat message', $('#m').val());
          $('#m').val('');
          return false;
        });
        socket.on('chat message', function(msg){
          var classe = msg.indexOf("🤖") === 0 ? "robo" : "usuario";
          $('#messages').append($('<li>').addClass(classe).text(msg));
          $('#messages').scrollTop($('#messages')[0].scrollHeight);
        });
      });
    </script>
  </body>
</html>
